# =============================================================================
# Sub2API Docker Compose - Production (Self-Built Image)
# =============================================================================
# This override file configures Sub2API for production deployment:
# - Uses locally built Docker image from source code
# - No exposed database ports (internal network only)
# - Restart always for automatic recovery
# - Optimized resource limits
#
# Build image first:
#   docker build -t sub2api:production .
#
# Usage:
#   docker compose -f docker-compose.local.yml -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.local.yml -f docker-compose.production.yml logs -f sub2api
# =============================================================================

services:
  # ===========================================================================
  # Sub2API Application - Production (Self-Built)
  # ===========================================================================
  sub2api:
    # 生产环境使用本地自建镜像
    image: sub2api:production
    container_name: sub2api
    restart: always
    # 生产环境移除端口限制以支持更高并发
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    # 生产环境配置（无外部端口暴露，由 Nginx 等反向代理处理）
    ports: []
    # 生产环境日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    # 生产环境健康检查更频繁
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # PostgreSQL Database - Production
  # ===========================================================================
  postgres:
    # 生产环境不暴露端口，数据库仅通过内部网络访问
    ports: []
    restart: always
    # 生产环境日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    # 生产环境健康检查更频繁
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Redis Cache - Production
  # ===========================================================================
  redis:
    # 生产环境不暴露端口，Redis 仅通过内部网络访问
    ports: []
    restart: always
    # 生产环境日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    # 生产环境健康检查更频繁
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s